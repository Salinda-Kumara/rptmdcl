version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ermas-postgres
    environment:
      POSTGRES_DB: ermas
      POSTGRES_USER: ${POSTGRES_USER:-ermas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ermas123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ermas']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ermas-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ermas-api
    environment:
      DATABASE_URL: postgresql://ermas:ermas123@postgres:5432/ermas
      NODE_ENV: development
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    networks:
      - ermas-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: ermas-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    networks:
      - ermas-network

volumes:
  postgres_data:

networks:
  ermas-network:
    driver: bridge
