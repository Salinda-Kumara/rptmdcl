version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ermas-postgres
    environment:
      POSTGRES_DB: ermas
      POSTGRES_USER: ${POSTGRES_USER:-ermas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ermas123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ermas']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ermas-network

  redis:
    image: redis:7-alpine
    container_name: ermas-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ermas-network

  minio:
    image: minio/minio:latest
    container_name: ermas-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ermas-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ermas-api
    environment:
      DATABASE_URL: postgresql://ermas:ermas123@postgres:5432/ermas
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    networks:
      - ermas-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: ermas-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    networks:
      - ermas-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ermas-network:
    driver: bridge
